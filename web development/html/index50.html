<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Filters</title>

<style>

body{
    font-family: Arial, sans-serif;
}

.container{
    display:flex;
    gap:20px;
    justify-content:center;
    margin-top:40px;
}

img{
    width:300px;
    height:200px;
    object-fit:cover;
    border-radius:10px;
}

.img1{
    filter: brightness(120%);
}

.img2{
    filter: sepia(100%);
}

.img3{
    filter: grayscale(100%);
}

</style>
</head>

<body>

<div class="container">

<img class="img1" src="https://picsum.photos/id/1015/300/200" alt="">

<img class="img2" src="https://picsum.photos/id/1025/300/200" alt="">

<img class="img3" src="https://picsum.photos/id/1035/300/200" alt="">

</div>

</body>
</html>
