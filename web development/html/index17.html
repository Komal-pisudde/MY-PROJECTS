<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>

        /* Element Selector  */
        div{
            /* background-color: red; */
        }

        /* Class Selector  */
        .red{
            background-color: rgb(216, 11, 11);
        }

        /* Id Selector */
        #green{
            background-color: green;
        }

        /* Child Selectors  */
        div > p {
            color: blue;
            background-color: brown;
        }

        /* Descendant Selector  */
        div p {
            color: blue;
            background-color: brown;
        }

        /* Universal Selector */
        * {
            margin:0;
            padding: 0;
        }

        /* Pseudo Selector  */
        a:visited{
            color: rgb(12, 14, 65)
        }

        a:link {
            color: rgb(180, 71, 153);
        }

        a:active{
            background-color: red;
        }

        a:hover{
            background-color: rgb(104, 104, 18);
        }


        p:first-child{
            background-color: rgb(108, 247, 247);
        }

    </style>
</head>

<body>
    <main class="one">
        <p>I am first</p>
        <p>I am second</p>
    </main>

    <div class="red">
        I am a div
        <article>

            <p>I am a para inside div</p>

        </article>
    </div>

    <div id="green">
        I am another div

    </div>
    <a href="https://www.google.com">Go to Google</a>
       <a href="https://web.whatsapp.com">Go to whatsapp</a>

</body>
</html>
