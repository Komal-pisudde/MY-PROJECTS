
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>

    <style>

        /* Universal Selector */
        * {
            margin: 0;
            padding: 0;
        }


        /* Element Selector */
        div {
            padding: 10px;
            margin: 10px;
        }


        /* Class Selector */
        .red {
            background-color: rgb(216, 11, 11);
            color: white;
        }


        /* ID Selector */
        #green {
            background-color: green;
            color: white;
        }


        /* Child Selector */
        div > p {
            color: blue;
            background-color: brown;
        }


        /* Descendant Selector */
        div p {
            color: blue;
            background-color: brown;
        }


        /* Link Pseudo Selectors */

        a:link {
            color: rgb(180, 71, 153);
        }


        a:visited {
            color: rgb(12, 14, 65);
        }


        a:hover {
            background-color: yellow;
        }


        a:active {
            background-color: red;
        }


        /* First Child Selector */
        p:first-child {
            background-color: rgb(108, 247, 247);
        }


    </style>

</head>


<body>


    <main class="one">

        <p>I am first</p>
        <p>I am second</p>

    </main>



    <div class="red">

        I am a div

        <article>

            <p>I am a para inside div</p>

        </article>

    </div>



    <div id="green">

        I am another div

    </div>



    <a href="https://www.google.com">
        Go to Google
    </a>


    <a href="https://web.whatsapp.com">
        Go to WhatsApp
    </a>


</body>

</html>
