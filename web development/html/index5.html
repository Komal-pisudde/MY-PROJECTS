<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="../css/style5.css">
</head>

<body>

    <!-- Image -->
    <img height="230" src="istockphoto-2154467772-612x612.jpg" alt="krishna">

    <br><br>

    <!-- Table -->
    <table border="1">
        <caption>Employee Details</caption>

        <thead>
            <tr>
                <th>Name</th>
                <th>Designation</th>
                <th>Fav Language</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Harry</td>
                <td>Programmer</td>
                <td>JavaScript</td>
            </tr>

            <tr>
                <td colspan="2">Sam</td>
                <td rowspan="2">Java</td>
            </tr>

            <tr>
                <td colspan="2">Rohan</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="2">Footer</td>
                <td>Foot</td>
            </tr>
        </tfoot>
    </table>

    <br>

    <!-- Unordered List -->
    <ul type="square">
        <li>KOMAL</li>
        <li>SWARA </li>
        <li>MADHURA</li>
    </ul>

    <!-- Ordered List -->
    <ol type="A">
        <li>KOMAL</li>
        <li>SWARA </li>
        <li>MADHURA</li>
    </ol>

</body>

</html>
