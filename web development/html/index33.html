<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multicolor Website</title>

    <style>
        /* CSS Variables */
        :root {
            --primary-color: #6c63ff;
            --secondary-color: #4CAF50;
            --bg-color: #f4f4f4;
            --text-color: #333;
            --nav-bg: #2c3e50;
            --card-bg: white;
            --button-bg: #ff5722;
            --button-hover: #e64a19;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
        }

        /* Navbar */
        nav {
            background: var(--nav-bg);
            padding: 15px;
        }

        nav ul {
            display: flex;
            justify-content: center;
            list-style: none;
            gap: 30px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        nav ul li a:hover {
            color: var(--primary-color);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: var(--primary-color);
            color: white;
        }

        .hero h1 {
            margin-bottom: 15px;
        }

        .hero button {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            background: var(--button-bg);
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        .hero button:hover {
            background: var(--button-hover);
        }

        /* Cards */
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 40px;
        }

        .card {
            background: var(--card-bg);
            width: 250px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: var(--secondary-color);
            margin-bottom: 10px;
        }

        .card p {
            margin-bottom: 15px;
        }

        .card button {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
        }

        .card button:hover {
            opacity: 0.8;
        }

        /* Footer */
        footer {
            background: var(--nav-bg);
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <h1>Welcome to My Website</h1>
        <p>This website uses CSS Variables for colors.</p>
        <button>Get Started</button>
    </section>

    <div class="container">

        <div class="card">
            <h2>HTML</h2>
            <p>Learn the basics of HTML.</p>
            <button>Read More</button>
        </div>

        <div class="card">
            <h2>CSS</h2>
            <p>Style your websites beautifully.</p>
            <button>Read More</button>
        </div>

        <div class="card">
            <h2>JavaScript</h2>
            <p>Make your website interactive.</p>
            <button>Read More</button>
        </div>

    </div>

    <footer>
        © 2026 Multicolor Website | Made with CSS Variables
    </footer>

</body>
</html>
